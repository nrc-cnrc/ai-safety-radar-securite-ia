<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Safety Radar</title>
  <meta name="description" content="Daily AI safety research, policy, and development digest">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="alternate" type="application/rss+xml" title="AI Safety Radar RSS" href="feed.xml">
  <script defer src="https://cloud.umami.is/script.js" data-website-id="b9d7893d-161e-443c-8848-913175887a54"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #fbfbfd;
      --border: #e4e6ec;
      --border-strong: #d1d5dc;
      --text: #14161a;
      --text-muted: #6b6f78;
      --accent: #0b6aa8;
      --accent-hover: #084e7c;
      --accent-subtle: #0b6aa814;
      --link: #0b6aa8;
      --green: #2a7d4f;
      --orange: #b45309;
      --red: #df2039;
      --strong: #0a0b0d;
      --header-height: 56px;
    }

    [data-theme="dark"] {
      --bg: #101922;
      --surface: #161b22;
      --border: #272d35;
      --border-strong: #4a525c;
      --text: #e6edf3;
      --text-muted: #a4adb8;
      --accent: #7aaae6;
      --accent-hover: #9cc1ed;
      --accent-subtle: #7aaae620;
      --link: #8fb6f5;
      --green: #4dc466;
      --orange: #e0a937;
      --red: #ff6a6a;
      --strong: #f0f6fc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
    }

    /* Visually hidden, but available to screen readers */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Skip-to-main link (visible on focus) */
    .skip-link {
      position: absolute;
      top: -100px;
      left: 8px;
      z-index: 1000;
      background: var(--accent);
      color: #ffffff;
      padding: 10px 16px;
      border-radius: 4px;
      text-decoration: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      transition: top 0.15s;
    }
    .skip-link:focus {
      top: 8px;
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }

    /* Visible focus indicators for keyboard users */
    a:focus-visible,
    button:focus-visible,
    input:focus-visible,
    [tabindex]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 3px;
    }
    .file-link:focus-visible { outline-offset: -2px; }
    /* main receives focus from the skip link; suppress the outline around the whole content area */
    main:focus-visible, main:focus { outline: none; }

    /* Honor reduced motion preference */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ------ HEADER ------ */
    header {
      border-bottom: 1px solid var(--border-strong);
      padding: 0 28px 0 16px;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo .mark {
      width: 43px;
      height: 43px;
      flex-shrink: 0;
    }

    .logo .t { display: flex; flex-direction: column; line-height: 1.15; }

    .logo .t b {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .logo .t span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    header nav { display: flex; gap: 0; align-items: center; flex-shrink: 0; margin-left: 24px; }

    header nav a, header nav button {
      color: var(--text);
      text-decoration: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: none;
      border: 1px solid transparent;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.12s;
    }

    header nav a:hover, header nav button:hover { border-color: var(--border-strong); background: var(--bg); }

    .theme-toggle { padding: 6px 8px; }

    /* ------ SIDEBAR ------ */
    .sidebar {
      position: fixed;
      left: 0;
      top: var(--header-height);
      bottom: 0;
      width: 290px;
      border-right: 1px solid var(--border-strong);
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .search-box {
      flex-shrink: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .search-box .wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
    }

    .search-box .wrap svg { color: var(--text-muted); flex-shrink: 0; }

    .search-box input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }

    .search-box input::placeholder { color: var(--text-muted); opacity: 0.8; }

    .sidebar-entries { flex: 1; overflow-y: auto; padding: 6px 0 16px; }

    .date-group {
      margin: 0 14px;
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }

    .month-entries .date-group:first-child { border-top: none; }

    .date-label {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
      color: inherit;
      font: inherit;
    }

    .date-label:hover { background: var(--bg); }

    .date-label .num {
      font-family: 'IBM Plex Serif', serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .date-label .dow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .date-label .rel {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .date-label .rel.today { color: var(--accent); }

    .date-label .chevron {
      transition: transform 0.2s;
      opacity: 0.5;
      flex-shrink: 0;
      margin-left: 4px;
    }

    .date-group.collapsed .chevron { transform: rotate(-90deg); }

    .date-files {
      overflow: hidden;
      transition: max-height 0.2s ease;
      padding: 4px 0;
    }

    .date-group.collapsed .date-files { max-height: 0 !important; padding: 0; }

    .file-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px 6px 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      border-radius: 4px;
      margin: 1px 0;
      transition: background 0.1s;
      position: relative;
    }

    .file-link::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border-strong);
      flex-shrink: 0;
    }

    .file-link:hover { background: var(--bg); }

    .file-link.active { background: var(--accent-subtle); font-weight: 500; }
    .file-link.active::before { background: var(--accent); }

    .file-link .lbl { flex: 1; }

    .file-link .badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
      flex-shrink: 0;
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 1px 5px;
    }

    .badge-daily { color: var(--accent); border-color: var(--accent); }
    .badge-weekly { color: var(--orange); border-color: var(--orange); }

    /* ------ MAIN ------ */
    .main {
      margin-left: 290px;
      padding: 56px 72px 96px;
      min-height: calc(100vh - var(--header-height));
    }

    #content { max-width: 720px; }

    #content h1 {
      font-family: 'IBM Plex Serif', serif;
      font-weight: 500;
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 1.5rem;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--text);
    }

    #content h2 {
      font-family: 'IBM Plex Serif', serif;
      font-weight: 500;
      font-size: 22px;
      letter-spacing: -0.015em;
      line-height: 1.2;
      color: var(--text);
      margin: 2.75rem 0 1rem;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-strong);
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    #content h2::before {
      content: "§";
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    #content h3 {
      font-family: 'IBM Plex Serif', serif;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.3;
      color: var(--text);
      margin: 1.75rem 0 0.5rem;
    }

    #content p { margin-bottom: 1rem; line-height: 1.7; }
    #content a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: color 0.12s;
    }
    #content a:hover { color: var(--accent-hover); }
    #content ul, #content ol { padding-left: 1.4rem; margin-bottom: 1rem; }
    #content li { margin-bottom: 0.5rem; line-height: 1.7; }
    #content strong { color: var(--strong); font-weight: 600; }
    #content code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.88em;
      background: var(--surface);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    #content pre {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--surface);
      padding: 1.1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 1.1rem;
      border: 1px solid var(--border);
    }
    #content pre code { background: none; padding: 0; border: none; }
    #content blockquote {
      border-left: 2px solid var(--accent);
      padding: 0.25rem 0 0.25rem 1.1rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-style: italic;
      font-family: 'IBM Plex Serif', serif;
      font-size: 18px;
    }
    #content hr { border: none; border-top: 1px solid var(--border-strong); margin: 2rem 0; }

    .ai-disclaimer {
      margin-top: 4rem;
      padding-top: 18px;
      border-top: 1px solid var(--text);
      font-family: 'IBM Plex Serif', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.65;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .ai-disclaimer .icon {
      flex-shrink: 0;
      color: var(--accent);
      width: 44px;
      height: 44px;
    }

    .ai-disclaimer a { color: var(--text-muted); text-decoration: underline; }
    .ai-disclaimer a:hover { color: var(--link); }

    .welcome {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
    }

    .welcome h1 {
      font-family: 'IBM Plex Serif', serif;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--accent);
      border: none;
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .welcome p { font-size: 1rem; line-height: 1.7; }

    .loading { color: var(--text-muted); padding: 2rem; text-align: center; font-size: 0.9rem; }

    .search-results-info {
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 0.25rem 1rem 0.5rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    .date-group.hidden { display: none; }

    .month-group { margin-bottom: 10px; }

    .month-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      padding: 14px 20px 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      transition: color 0.1s;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
    }

    .month-label:hover { color: var(--text); }

    .month-label .chevron {
      transition: transform 0.2s;
      opacity: 0.6;
      flex-shrink: 0;
    }

    .month-group.collapsed .month-label .chevron { transform: rotate(-90deg); }

    .month-entries { display: block; }
    .month-group.collapsed .month-entries { display: none; }
    .month-group.hidden { display: none; }

    @media (max-width: 768px) {
      .sidebar {
        position: static;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border-strong);
        max-height: 40vh;
      }
      .main { margin-left: 0; padding: 1.5rem; }
    }
  </style>
</head>

    }

    function t() {
      return I18N[getLang()];
    }

    function applyLang(lang) {
      const strings = I18N[lang];
      const langToggle = document.getElementById('langToggle');
      const nextLangCode = lang === 'en' ? 'FR' : 'EN';
      langToggle.innerHTML = `<span aria-hidden="true">${nextLangCode}</span>`;
      // aria-label is written in the CURRENT page language so screen readers pronounce it correctly
      langToggle.setAttribute('aria-label', lang === 'en' ? 'Switch to French' : 'Passer à l\'anglais');

      // Keep <html lang> and document title in sync with current UI language
      document.documentElement.lang = lang === 'fr' ? 'fr' : 'en';
      const siteName = lang === 'fr' ? 'Radar de la sécurité en IA' : 'AI Safety Radar';
      document.title = siteName;

      const welcomeTitle = document.getElementById('welcomeTitle');
      const welcomeSub = document.getElementById('welcomeSub');
      const welcomeHint = document.getElementById('welcomeHint');
      if (welcomeTitle) welcomeTitle.textContent = strings.welcomeTitle;
      if (welcomeSub) welcomeSub.textContent = strings.welcomeSub;
      if (welcomeHint) welcomeHint.textContent = strings.welcomeHint;
      const logoTitle = document.getElementById('logoTitle');
      const logoSub = document.getElementById('logoSub');
      if (logoTitle) logoTitle.textContent = siteName;
      if (logoSub) logoSub.textContent = lang === 'en' ? 'Daily digest' : 'Bulletin quotidien';

      const logoLink = document.querySelector('.logo');
      if (logoLink) logoLink.setAttribute('aria-label', `${siteName} — ${lang === 'fr' ? 'accueil' : 'home'}`);

      const navRss = document.getElementById('navRss');
      const navRssSr = document.getElementById('navRssSr');
      const navSource = document.getElementById('navSource');
      if (navRss) navRss.textContent = 'RSS';
      if (navRssSr) navRssSr.textContent = lang === 'fr' ? ' (fil RSS)' : ' feed';
      if (navSource) navSource.textContent = lang === 'fr' ? 'Source' : 'Source';

      const skip = document.getElementById('skipLink');
      if (skip) skip.textContent = lang === 'fr' ? 'Aller au contenu principal' : 'Skip to main content';
    }

    function hashForLang(hash, lang) {
      if (!hash) return hash;
      if (lang === 'fr') {
        // Switch to .fr.md version
        return hash.endsWith('.fr.md') ? hash : hash.replace('.md', '.fr.md');
      } else {
        // Switch to .md version
        return hash.replace('.fr.md', '.md');
      }
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      const next = getLang() === 'en' ? 'fr' : 'en';
      localStorage.setItem('lang', next);
      applyLang(next);
      applyTheme(getTheme()); // refresh theme button aria-label in the new language
      if (currentManifest) renderSidebar(currentManifest);
      const hash = location.hash.slice(1);
      if (hash) {
        const newHash = hashForLang(hash, next);
        // Update URL silently then load content
        history.replaceState(null, '', '#' + newHash);
        loadContent(newHash);
      }
    });

    // Cache loaded content for search
    const contentCache = {};

    // Theme management
    function getTheme() {
      return localStorage.getItem('theme') || 'light';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('iconSun').style.display = theme === 'dark' ? 'block' : 'none';
      document.getElementById('iconMoon').style.display = theme === 'dark' ? 'none' : 'block';
      const logoMark = document.querySelector('.logo .mark');
      if (logoMark) logoMark.src = theme === 'dark' ? 'assets/ai-safety-radar-inverse.svg' : 'assets/ai-safety-radar.svg';

      const themeToggle = document.getElementById('themeToggle');
      const lang = getLang();
      const nextIsDark = theme === 'light';
      themeToggle.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
      themeToggle.setAttribute(
        'aria-label',
        lang === 'fr'
          ? (nextIsDark ? 'Passer au thème sombre' : 'Passer au thème clair')
          : (nextIsDark ? 'Switch to dark theme' : 'Switch to light theme')
      );
    }

    applyTheme(getTheme());

    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = getTheme() === 'light' ? 'dark' : 'light';
      localStorage.setItem('theme', next);
      applyTheme(next);
    });

    // Sort files: daily/weekly first, then alphabetical
    function sortFiles(files) {
      const priority = { 'weekly': 0, 'daily': 1, 'research': 2 };
      return [...files].sort((a, b) => {
        const pa = Object.entries(priority).find(([k]) => a.includes(k));
        const pb = Object.entries(priority).find(([k]) => b.includes(k));
        const va = pa ? pa[1] : 99;
        const vb = pb ? pb[1] : 99;
        if (va !== vb) return va - vb;
        return a.localeCompare(b);
      });
    }

    function filterFilesByLang(files) {
      const lang = getLang();
      if (lang === 'fr') {
        // For each EN file, show its .fr.md if it exists, otherwise show the EN file
        return files
          .filter(f => !f.endsWith('.fr.md'))
          .map(f => files.includes(f.replace('.md', '.fr.md')) ? f.replace('.md', '.fr.md') : f);
      } else {
        return files.filter(f => !f.endsWith('.fr.md'));
      }
    }

    function fileLabel(filename) {
      const map = t().fileLabels;
      for (const [key, label] of Object.entries(map)) {
        if (filename.includes(key)) return label;
      }
      return filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/\.fr\.md$/, '').replace('.md', '');
    }

    function fileBadge(filename) {
      if (filename.includes('daily')) return `<span class="badge badge-daily">${t().badges.daily}</span>`;
      if (filename.includes('weekly')) return `<span class="badge badge-weekly">${t().badges.weekly}</span>`;
      return '';
    }

    async function loadManifest() {
      try {
        const res = await fetch('manifest.json');
        if (!res.ok) throw new Error('No manifest');
        return await res.json();
      } catch {
        return { entries: [] };
      }
    }

    let currentManifest = null;

    function monthKey(date) {
      return date.slice(0, 7); // "YYYY-MM"
    }

    function monthLabel(ym) {
      const [y, m] = ym.split('-');
      return new Date(+y, +m - 1, 1).toLocaleDateString(t().locale, { month: 'long', year: 'numeric' });
    }

    function renderSidebar(manifest) {
      currentManifest = manifest;
      const sidebar = document.getElementById('sidebar');
      if (manifest.entries.length === 0) {
        sidebar.innerHTML = `<div class="loading">${t().noDigests}</div>`;
        return;
      }

      // Group entries by month
      const months = [];
      const monthMap = {};
      for (const entry of manifest.entries) {
        const mk = monthKey(entry.date);
        if (!monthMap[mk]) { monthMap[mk] = []; months.push(mk); }
        monthMap[mk].push(entry);
      }

      const chevronSvg = `<svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;

      const chevronSvgHidden = chevronSvg.replace('<svg ', '<svg aria-hidden="true" focusable="false" ');
      const searchLabel = t().searchPlaceholder;
      let html = `<div class="search-box" role="search"><div class="wrap"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg><label for="searchInput" class="sr-only">${searchLabel}</label><input type="search" id="searchInput" placeholder="${searchLabel}" aria-label="${searchLabel}" autocomplete="off"></div></div>`;
      html += '<div class="sidebar-entries" id="sidebarEntries">';

      months.forEach((mk, mi) => {
        const monthCollapsed = mi > 0 ? ' collapsed' : '';
        const monthExpanded = mi === 0 ? 'true' : 'false';
        const monthEntriesId = `month-entries-${mk}`;
        html += `<div class="month-group${monthCollapsed}" data-month="${mk}">`;
        html += `<button type="button" class="month-label" aria-expanded="${monthExpanded}" aria-controls="${monthEntriesId}"><span>${monthLabel(mk)}</span>${chevronSvgHidden}</button>`;

        const entriesHtml = monthMap[mk].map((entry, i) => {
          const sorted = sortFiles(filterFilesByLang(entry.files));
          const dayCollapsed = (mi === 0 && i === 0) ? '' : ' collapsed';
          const dayExpanded = (mi === 0 && i === 0) ? 'true' : 'false';
          const dayFilesId = `date-files-${entry.date}`;
          const filesHtml = sorted.map(file =>
            `<a href="#${file}" class="file-link" data-hash="${file}" data-label="${fileLabel(file).toLowerCase()}" data-date="${entry.date}"><span class="lbl">${fileLabel(file)}</span>${fileBadge(file)}</a>`
          ).join('');
          const filesHeight = sorted.length * 42;
          const d = new Date(entry.date + 'T12:00:00');
          const lang = getLang();
          const dayNum = d.getDate();
          const dow = d.toLocaleDateString(lang === 'fr' ? 'fr-CA' : 'en-US', { weekday: 'short' }).replace('.', '');
          const fullDateLabel = d.toLocaleDateString(lang === 'fr' ? 'fr-CA' : 'en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
          const today = new Date(); today.setHours(0,0,0,0);
          const dCopy = new Date(d); dCopy.setHours(0,0,0,0);
          const diffDays = Math.round((today - dCopy) / 86400000);
          let relText = '', relClass = '';
          if (diffDays === 0) { relText = lang === 'fr' ? "auj." : "today"; relClass = 'today'; }
          else if (diffDays === 1) { relText = lang === 'fr' ? 'hier' : 'yesterday'; }
          else if (diffDays > 1 && diffDays < 60) {
            relText = lang === 'fr' ? `il y a ${diffDays} jours` : `${diffDays} days ago`;
          }
          return `<div class="date-group${dayCollapsed}" data-date="${entry.date}">
            <button type="button" class="date-label" aria-expanded="${dayExpanded}" aria-controls="${dayFilesId}" aria-label="${fullDateLabel}${relText ? ', ' + relText : ''}">
              <span class="num" aria-hidden="true">${dayNum}</span>
              <span class="dow" aria-hidden="true">${dow}</span>
              ${relText ? `<span class="rel ${relClass}" aria-hidden="true">${relText}</span>` : ''}
              ${chevronSvgHidden}
            </button>
            <div class="date-files" id="${dayFilesId}" style="max-height:${dayCollapsed ? 0 : filesHeight}px">${filesHtml}</div>
          </div>`;
        }).join('');

        html += `<div class="month-entries" id="${monthEntriesId}">${entriesHtml}</div>`;
        html += '</div>';
      });

      html += '</div>';
      sidebar.innerHTML = html;

      // Wire up month collapsing
      document.querySelectorAll('.month-label').forEach(label => {
        label.addEventListener('click', () => {
          const group = label.closest('.month-group');
          const collapsed = group.classList.toggle('collapsed');
          label.setAttribute('aria-expanded', String(!collapsed));
        });
      });

      // Wire up day collapsing
      document.querySelectorAll('.date-label').forEach(label => {
        label.addEventListener('click', () => {
          const group = label.closest('.date-group');
          const files = group.querySelector('.date-files');
          const isCollapsed = group.classList.toggle('collapsed');
          files.style.maxHeight = isCollapsed ? '0px' : files.scrollHeight + 'px';
          label.setAttribute('aria-expanded', String(!isCollapsed));
        });
      });

      // Wire up search
      document.getElementById('searchInput').addEventListener('input', handleSearch);
    }

    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const monthGroups = document.querySelectorAll('.month-group');
      const dateGroups = document.querySelectorAll('.date-group');

      if (!query) {
        // Restore original state: first month expanded, first day expanded, rest collapsed
        monthGroups.forEach((mg, mi) => {
          mg.classList.remove('hidden');
          mg.classList.toggle('collapsed', mi > 0);
        });
        dateGroups.forEach((dg, di) => {
          dg.classList.remove('hidden');
          dg.classList.toggle('collapsed', di > 0);
          const files = dg.querySelector('.date-files');
          if (files) files.style.maxHeight = di > 0 ? '0px' : files.scrollHeight + 'px';
        });
        document.querySelectorAll('.file-link').forEach(l => l.style.display = '');
        const info = document.querySelector('.search-results-info');
        if (info) info.remove();
        return;
      }

      let totalMatches = 0;
      dateGroups.forEach(group => {
        const date = group.dataset.date;
        const links = group.querySelectorAll('.file-link');
        let groupHasMatch = false;

        links.forEach(link => {
          const label = link.dataset.label;
          const file = link.dataset.hash;
          const cached = contentCache[file] || '';
          const matches = date.includes(query) || label.includes(query) || cached.toLowerCase().includes(query);
          link.style.display = matches ? '' : 'none';
          if (matches) { groupHasMatch = true; totalMatches++; }
        });

        group.classList.toggle('hidden', !groupHasMatch);
        if (groupHasMatch) {
          group.classList.remove('collapsed');
          const files = group.querySelector('.date-files');
          if (files) files.style.maxHeight = files.scrollHeight + 'px';
        }
      });

      // Show/hide month groups based on whether any day inside matches
      monthGroups.forEach(mg => {
        const hasVisible = [...mg.querySelectorAll('.date-group')].some(dg => !dg.classList.contains('hidden'));
        mg.classList.toggle('hidden', !hasVisible);
        if (hasVisible) {
          mg.classList.remove('collapsed');
        }
      });

      // Show count
      let info = document.querySelector('.search-results-info');
      if (!info) {
        info = document.createElement('div');
        info.className = 'search-results-info';
        info.setAttribute('role', 'status');
        info.setAttribute('aria-live', 'polite');
        document.getElementById('sidebarEntries').prepend(info);
      }
      info.textContent = t().resultsFound(totalMatches);
    }

    async function loadContent(file) {
      const content = document.getElementById('content');
      content.setAttribute('aria-busy', 'true');
      content.innerHTML = `<div class="loading" role="status">${t().loadingContent}</div>`;

      try {
        const res = await fetch(`digests/${file}`);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        contentCache[file] = md;
        const warnIcon = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
        const disclaimerLabel = getLang() === 'fr' ? 'Avertissement' : 'Disclaimer';
        content.innerHTML = marked.parse(md) + `<aside class="ai-disclaimer" role="note" aria-label="${disclaimerLabel}">${warnIcon}<span>${t().disclaimer}</span></aside>`;
      } catch {
        content.innerHTML = `<div class="loading" role="alert">${t().failedLoad}</div>`;
      }
      content.setAttribute('aria-busy', 'false');

      document.querySelectorAll('.file-link').forEach(el => {
        const isActive = el.dataset.hash === file;
        el.classList.toggle('active', isActive);
        if (isActive) {
          el.setAttribute('aria-current', 'page');
        } else {
          el.removeAttribute('aria-current');
        }
      });
    }

    // Preload content for search indexing
    async function preloadContent(manifest) {
      for (const entry of manifest.entries) {
        for (const file of entry.files) {
          if (contentCache[file]) continue;
          try {
            const res = await fetch(`digests/${file}`);
            if (res.ok) contentCache[file] = await res.text();
          } catch {}
        }
      }
    }

    function handleHash() {
      const hash = location.hash.slice(1);
      if (hash) loadContent(hash);
    }

    async function init() {
      applyLang(getLang());
      const manifest = await loadManifest();
      renderSidebar(manifest);
      handleHash();

      if (!location.hash && manifest.entries.length > 0) {
        const latest = manifest.entries[0];
        const sorted = sortFiles(filterFilesByLang(latest.files));
        if (sorted.length > 0) location.hash = sorted[0];
      }

      // Preload in background for search
      preloadContent(manifest);
    }

    window.addEventListener('hashchange', handleHash);
    init();
  </script>
</body>
</html>
