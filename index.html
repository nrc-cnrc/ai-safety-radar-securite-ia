<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Safety Radar</title>
  <meta name="description" content="Daily AI safety research, policy, and development digest">
  <link rel="icon" href="https://www.canada.ca/etc/designs/canada/wet-boew/assets/favicon.ico">
  <link rel="alternate" type="application/rss+xml" title="AI Safety Radar RSS" href="feed.xml">

  <!-- GC Design System: utility classes (CSS shortcuts) -->
  <link rel="stylesheet" href="https://cdn.design-system.canada.ca/@cdssnc/gcds-utility@1.11.0/dist/gcds-utility.min.css">

  <!-- GC Design System: component styles + ESM bundle -->
  <link rel="stylesheet" href="https://cdn.design-system.canada.ca/@cdssnc/gcds-components@0.47.0/dist/gcds/gcds.css">
  <script type="module" src="https://cdn.design-system.canada.ca/@cdssnc/gcds-components@0.47.0/dist/gcds/gcds.esm.js"></script>

  <style>
    /* Local layout: sidebar + main, sitting between gcds-header and gcds-footer */
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
      align-items: start;
    }
    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      max-height: 100vh;
      overflow-y: auto;
      padding: 8px 12px 12px;
      border-right: 1px solid var(--gcds-border-default, #dcdcdc);
      font-family: 'Noto Sans', sans-serif;
    }
    .main-area { padding: 8px 32px 48px; min-width: 0; }
    gcds-container[main-container] { --gcds-container-padding: 0; padding-top: 0 !important; padding-bottom: 0 !important; }

    /* GC Design System search pattern */
    .search-box { margin-bottom: 12px; }
    .search-input-group {
      display: flex;
      align-items: stretch;
    }
    .search-input-group input[type="search"] {
      flex: 1;
      min-width: 0;
      padding: 6px 8px;
      border: 1.9px solid #000;
      border-right: none;
      border-radius: 0;
      font-family: 'Noto Sans', sans-serif;
      font-size: 0.9375rem;
      line-height: 1.5;
      color: #1b1b1b;
      background: #fff;
      box-sizing: border-box;
      -webkit-appearance: none;
    }
    .search-input-group input[type="search"]:focus {
      outline: 4px solid #ffbf47;
      outline-offset: 0;
      border-color: #0535d2;
      border-right: none;
      z-index: 1;
      position: relative;
    }
    .search-input-group button {
      flex-shrink: 0;
      background: #26374a;
      border: 1.9px solid #26374a;
      border-radius: 0;
      padding: 0 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .search-input-group button:hover { background: #1c2a38; }
    .search-input-group button:focus {
      outline: 4px solid #ffbf47;
      outline-offset: 0;
    }

    .month-group { border-bottom: 1px solid #dcdcdc; }
    .month-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #333;
      padding: 6px 4px;
      cursor: pointer;
      user-select: none;
    }
    .month-label:hover { color: #1354ec; }
    .month-label .chevron { transition: transform 0.2s; }
    .month-group.collapsed .chevron { transform: rotate(-90deg); }
    .month-entries { padding: 0 0 4px; }
    .month-group.collapsed .month-entries { display: none; }
    .month-group.hidden { display: none; }

    .date-group { padding: 1px 0; }
    .date-label {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 3px 6px;
      cursor: pointer;
      border-radius: 4px;
      user-select: none;
    }
    .date-label:hover { background: #f2f2f2; }
    .date-label .num { font-family: 'Lato', sans-serif; font-size: 17px; font-weight: 700; color: #333; }
    .date-label .dow { font-size: 12px; color: #595959; font-weight: 500; }
    .date-label .rel { margin-left: auto; font-size: 11px; color: #595959; }
    .date-label .rel.today {
      color: #fff; background: #1f497a;
      padding: 1px 6px; border-radius: 3px; font-weight: 700;
    }
    .date-label .chevron { transition: transform 0.2s; color: #595959; }
    .date-group.collapsed .chevron { transform: rotate(-90deg); }
    .date-files { overflow: hidden; transition: max-height 0.2s ease; }
    .date-group.collapsed .date-files { max-height: 0 !important; }
    .date-group.hidden { display: none; }

    .file-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 3px 10px 3px 18px;
      color: #1f497a;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-size: 14px;
      border-left: 3px solid transparent;
      margin: 0;
    }
    .file-link:hover { background: #f2f2f2; color: #1354ec; }
    .file-link.active {
      background: #f2f2f2;
      border-left-color: #ea2d37;
      color: #333;
      text-decoration: none;
      font-weight: 700;
    }
    .file-link .badge {
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: #fff;
      border-radius: 3px;
      padding: 2px 6px;
      text-decoration: none;
    }
    .badge-daily { background: #1f497a; }
    .badge-weekly { background: #ee7100; }

    .search-results-info {
      font-size: 13px;
      color: #595959;
      padding: 4px 4px 8px;
      font-weight: 500;
    }

    /* Markdown body inside #content -- match gcds typography */
    #content { max-width: 860px; }
    #content > .welcome p { color: #595959; font-family: 'Noto Sans', sans-serif; font-size: 1rem; line-height: 1.65; }

    /* AI-generated body: monospace on a light surface, framed in a rounded
       box so it reads as a machine-generated artifact. */
    .ai-body {
      background: #f8f8f8;
      color: #333;
      font-family: 'Noto Sans', sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      padding: 1.5rem 1.75rem;
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      margin: 0 0 1.5rem;
    }
    #content .ai-body h1,
    #content .ai-body h2,
    #content .ai-body h3,
    #content .ai-body h4 {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', 'Courier New', monospace;
      font-weight: 700;
      color: #1b1b1b;
    }
    #content .ai-body h1 { font-size: 1.4rem; line-height: 1.25; margin: 0 0 1rem; }
    #content .ai-body h2 { font-size: 1.15rem; line-height: 1.3; margin: 1.75rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid #dcdcdc; }
    #content .ai-body h3 { font-size: 1rem; line-height: 1.35; margin: 1.25rem 0 0.5rem; }
    #content .ai-body h4 { font-size: 0.9375rem; margin: 1rem 0 0.4rem; }

    .ai-body p,
    .ai-body li {
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.6;
      color: #333;
      font-weight: 400;
    }
    .ai-body p { margin: 0 0 0.85rem; max-width: 80ch; }
    .ai-body ul, .ai-body ol { padding-left: 1.4rem; margin: 0 0 0.85rem; }
    .ai-body li { margin-bottom: 0.35rem; }
    .ai-body a { color: #1f497a; text-decoration: underline; text-underline-offset: 3px; }
    .ai-body a:hover { color: #1354ec; text-decoration-thickness: 2px; }
    .ai-body a:visited { color: #4b248f; }
    .ai-body strong { font-weight: 700; color: #1b1b1b; }
    .ai-body code { font-family: inherit; font-size: 0.92em; background: #ececec; padding: 0.1rem 0.4rem; border-radius: 3px; border: 1px solid #dcdcdc; color: #333; }
    .ai-body pre { font-family: inherit; background: #ececec; padding: 1rem 1.25rem; border-radius: 4px; border-left: 4px solid #1f497a; overflow-x: auto; margin: 0 0 1rem; color: #333; }
    .ai-body pre code { background: none; padding: 0; border: none; color: inherit; }
    .ai-body blockquote { border-left: 4px solid #1f497a; background: #ececec; padding: 0.85rem 1.1rem; margin: 0 0 1rem; border-radius: 0 4px 4px 0; color: #595959; }
    .ai-body hr { border: none; border-top: 1px solid #dcdcdc; margin: 1.75rem 0; }

    .ai-notice-bottom { display: block; margin: 1.5rem 0 0; font-size: 0.75rem; }
    .ai-notice-bottom gcds-text { font-size: 0.75rem; }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    .main-header { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 1.25rem; }
    .main-header-text { min-width: 0; }
    .main-title { font-family: 'Lato', sans-serif; font-weight: 700; font-size: 2rem; color: #333; margin: 0 0 2px; line-height: 1.2; }
    .main-desc { font-family: 'Noto Sans', sans-serif; font-size: 1rem; font-weight: 400; color: #333; margin: 0; line-height: 1.5; }
    .rss-link { display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0; font-size: 13px; color: #1f497a; text-decoration: underline; text-underline-offset: 2px; white-space: nowrap; }
    .rss-link:hover { color: #1354ec; }

    .welcome { padding: 1rem 0 3rem; }
    .loading { color: #595959; padding: 1.5rem; text-align: center; font-size: 0.95rem; }

    @media (max-width: 900px) {
      .layout { display: block; }
      .sidebar { position: static; max-height: none; border-right: none; border-bottom: 1px solid #dcdcdc; }
      .main-area { padding: 16px; }
    }
  </style>
</head>
<body>
  <gcds-header lang-href="#" skip-to-href="#main-content" signature-variant="colour"></gcds-header>

  <gcds-container id="main-content" tag="main" size="full" main-container>
    <div class="layout">
      <aside class="sidebar" id="sidebar" aria-label="Digest archive">
        <div class="loading" id="sidebarLoading">Loading…</div>
      </aside>

      <div class="main-area">
        <div class="main-header">
          <div class="main-header-text">
            <h1 class="main-title">AI Safety Radar</h1>
            <p class="main-desc">An automated digest around AI safety and security research developments.</p>
          </div>
          <a class="rss-link" href="feed.xml">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
            RSS
          </a>
        </div>
        <div id="content">
          <div class="welcome" id="welcomeScreen">
            <p id="welcomeHint">Select a digest from the sidebar to begin reading.</p>
          </div>
        </div>
      </div>
    </div>
  </gcds-container>

  <gcds-footer
    display="compact"
    contextual-heading="AI Safety Radar"
    contextual-links='{"Source code":"https://github.com/ygauthie/ai-safety-radar-securite-ia","RSS feed":"feed.xml"}'>
  </gcds-footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const I18N = {
      en: {
        noticeTopTitle: 'AI-generated contents',
        disclaimer: 'This digest is machine-generated from public sources. It may contain errors, omissions, or misattributions — verify with the linked originals before citing. This is a research tool and contents does not reflect the views of the National Research Council or the Government of Canada.',
        noDigests: 'No digests available yet.<br>Run the pipeline to generate the first digest.',
        loadingContent: 'Loading...',
        failedLoad: 'Failed to load digest.',
        searchPlaceholder: 'Search digests...',
        searchLabel: 'Search',
        resultsFound: (n) => `${n} result${n !== 1 ? 's' : ''} found`,
        welcomeTitle: 'AI Safety Radar',
        welcomeSub: 'A daily digest around AI safety and security developments.',
        welcomeHint: 'Select a digest from the sidebar to begin reading.',
        fileLabels: {
          'safety-daily': 'Daily Digest',
          'safety-weekly': 'Past Week',
          'safety-research': 'Research Papers',
          'safety-analysis': 'Blogs & News',
          'safety-community': 'Community & Tools',
          'safety-arxiv': 'ArXiv Papers',
          'safety-github': 'GitHub Activity',
          'safety-rss': 'Blog Posts',
          'safety-aisi': 'AI Safety Institutes',
          'safety-hn': 'Hacker News',
          'safety-journals': 'Journal Articles',
        },
        badges: { daily: 'Daily', weekly: 'Weekly' },
        locale: 'en-US',
      },
      fr: {
        noticeTopTitle: 'Contenu généré par IA',
        disclaimer: 'Le Radar de la Sécurité de l\'IA est un bulletin quotidien automatisé produit à partir de sources publiques. Il peut contenir des erreurs, des omissions ou des attributions inexactes — vérifiez avec les sources originales avant toute citation. Il s\'agit d\'un outil de recherche, et son contenu ne reflète pas les opinions du Conseil national de recherches ou du gouvernement du Canada.',
        noDigests: 'Aucun bulletin disponible pour l\'instant.<br>Lancez le pipeline pour générer le premier bulletin.',
        loadingContent: 'Chargement...',
        failedLoad: 'Impossible de charger le bulletin.',
        searchPlaceholder: 'Rechercher...',
        searchLabel: 'Rechercher',
        resultsFound: (n) => `${n} résultat${n !== 1 ? 's' : ''} trouvé${n !== 1 ? 's' : ''}`,
        welcomeTitle: 'Radar de la sécurité en IA',
        welcomeSub: 'Synthèse quotidienne de la recherche, des politiques et des développements en matière de sécurité de l\'IA.',
        welcomeHint: 'Sélectionnez un bulletin dans la barre latérale pour commencer à lire.',
        fileLabels: {
          'safety-daily': 'Bulletin quotidien',
          'safety-weekly': 'Résumé hebdomadaire',
          'safety-research': 'Articles de recherche',
          'safety-analysis': 'Blogues et actualités',
          'safety-community': 'Communauté et outils',
          'safety-arxiv': 'Articles ArXiv',
          'safety-github': 'Activité GitHub',
          'safety-rss': 'Articles de blogue',
          'safety-aisi': 'Instituts de sécurité de l\'IA',
          'safety-hn': 'Hacker News',
          'safety-journals': 'Articles scientifiques',
        },
        badges: { daily: 'Quotidien', weekly: 'Hebdo' },
        locale: 'fr-CA',
      },
    };

    function getLang() { return localStorage.getItem('lang') || 'en'; }
    function t() { return I18N[getLang()]; }

    function applyLang(lang) {
      const strings = I18N[lang];
      document.documentElement.lang = lang;
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      set('welcomeSub', strings.welcomeSub);
      set('welcomeHint', strings.welcomeHint);
    }

    function hashForLang(hash, lang) {
      if (!hash) return hash;
      if (lang === 'fr') return hash.endsWith('.fr.md') ? hash : hash.replace('.md', '.fr.md');
      return hash.replace('.fr.md', '.md');
    }

    // The gcds-header lang-href triggers a navigation. Intercept it to switch locale
    // in-app instead of navigating to "#".
    document.addEventListener('click', (e) => {
      const path = e.composedPath();
      const langLink = path.find(el => el.tagName && el.tagName.toLowerCase() === 'a' && el.classList && el.classList.contains('gcds-lang-toggle'));
      // The shadow-DOM lang toggle is hard to intercept; use the gcds custom event instead.
    });

    // gcds-header emits gcdsClick on the lang toggle; we listen on document (bubbles through shadow root).
    document.addEventListener('gcdsClick', (e) => {
      // No-op stub; we use a custom switch in the toolbar below if needed.
    });

    const contentCache = {};

    function sortFiles(files) {
      const priority = { 'weekly': 0, 'daily': 1, 'research': 2 };
      return [...files].sort((a, b) => {
        const pa = Object.entries(priority).find(([k]) => a.includes(k));
        const pb = Object.entries(priority).find(([k]) => b.includes(k));
        const va = pa ? pa[1] : 99;
        const vb = pb ? pb[1] : 99;
        if (va !== vb) return va - vb;
        return a.localeCompare(b);
      });
    }

    function filterFilesByLang(files) {
      const lang = getLang();
      if (lang === 'fr') {
        return files
          .filter(f => !f.endsWith('.fr.md'))
          .map(f => files.includes(f.replace('.md', '.fr.md')) ? f.replace('.md', '.fr.md') : f);
      }
      return files.filter(f => !f.endsWith('.fr.md'));
    }

    function fileLabel(filename) {
      const map = t().fileLabels;
      for (const [key, label] of Object.entries(map)) {
        if (filename.includes(key)) return label;
      }
      return filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/\.fr\.md$/, '').replace('.md', '');
    }

    function fileBadge(filename) {
      if (filename.includes('daily')) return `<span class="badge badge-daily">${t().badges.daily}</span>`;
      if (filename.includes('weekly')) return `<span class="badge badge-weekly">${t().badges.weekly}</span>`;
      return '';
    }

    async function loadManifest() {
      try {
        const res = await fetch('manifest.json');
        if (!res.ok) throw new Error('No manifest');
        return await res.json();
      } catch {
        return { entries: [] };
      }
    }

    let currentManifest = null;

    function monthKey(date) { return date.slice(0, 7); }
    function monthLabel(ym) {
      const [y, m] = ym.split('-');
      return new Date(+y, +m - 1, 1).toLocaleDateString(t().locale, { month: 'long', year: 'numeric' });
    }

    function renderSidebar(manifest) {
      currentManifest = manifest;
      const sidebar = document.getElementById('sidebar');
      if (manifest.entries.length === 0) {
        sidebar.innerHTML = `<div class="loading">${t().noDigests}</div>`;
        return;
      }

      const months = [];
      const monthMap = {};
      for (const entry of manifest.entries) {
        const mk = monthKey(entry.date);
        if (!monthMap[mk]) { monthMap[mk] = []; months.push(mk); }
        monthMap[mk].push(entry);
      }

      const chevronSvg = `<svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>`;

      let html = `
        <form role="search" class="search-box" onsubmit="return false">
        <label class="sr-only" for="searchInput">${t().searchLabel}</label>
        <div class="search-input-group">
          <input type="search" id="searchInput" placeholder="${t().searchPlaceholder}" aria-label="${t().searchLabel}" autocomplete="off">
          <button type="submit" aria-label="${t().searchLabel}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
      </form>`;
      html += '<div id="sidebarEntries">';

      months.forEach((mk, mi) => {
        const monthCollapsed = mi > 0 ? ' collapsed' : '';
        html += `<div class="month-group${monthCollapsed}" data-month="${mk}">`;
        html += `<div class="month-label" role="button" tabindex="0"><span>${monthLabel(mk)}</span>${chevronSvg}</div>`;

        const entriesHtml = monthMap[mk].map((entry, i) => {
          const sorted = sortFiles(filterFilesByLang(entry.files));
          const dayCollapsed = (mi === 0 && i === 0) ? '' : ' collapsed';
          const filesHtml = sorted.map(file =>
            `<a href="#${file}" class="file-link" data-hash="${file}" data-label="${fileLabel(file).toLowerCase()}" data-date="${entry.date}"><span class="lbl">${fileLabel(file)}</span>${fileBadge(file)}</a>`
          ).join('');
          const filesHeight = sorted.length * 30;
          const d = new Date(entry.date + 'T12:00:00');
          const lang = getLang();
          const dayNum = d.getDate();
          const dow = d.toLocaleDateString(lang === 'fr' ? 'fr-CA' : 'en-US', { weekday: 'short' }).replace('.', '');
          const today = new Date(); today.setHours(0,0,0,0);
          const dCopy = new Date(d); dCopy.setHours(0,0,0,0);
          const diffDays = Math.round((today - dCopy) / 86400000);
          let relText = '', relClass = '';
          if (diffDays === 0) { relText = lang === 'fr' ? "Aujourd'hui" : "Today"; relClass = 'today'; }
          else if (diffDays > 0 && diffDays < 60) { relText = diffDays + (lang === 'fr' ? 'j' : 'd'); }
          return `<div class="date-group${dayCollapsed}" data-date="${entry.date}">
            <div class="date-label" role="button" tabindex="0">
              <span class="num">${dayNum}</span>
              <span class="dow">${dow}</span>
              ${relText ? `<span class="rel ${relClass}">${relText}</span>` : ''}
              ${chevronSvg}
            </div>
            <div class="date-files" style="max-height:${dayCollapsed ? 0 : filesHeight}px">${filesHtml}</div>
          </div>`;
        }).join('');

        html += `<div class="month-entries">${entriesHtml}</div>`;
        html += '</div>';
      });

      html += '</div>';
      sidebar.innerHTML = html;

      document.querySelectorAll('.month-label').forEach(label => {
        label.addEventListener('click', () => label.closest('.month-group').classList.toggle('collapsed'));
      });
      document.querySelectorAll('.date-label').forEach(label => {
        label.addEventListener('click', () => {
          const group = label.closest('.date-group');
          const files = group.querySelector('.date-files');
          const isCollapsed = group.classList.toggle('collapsed');
          files.style.maxHeight = isCollapsed ? '0px' : files.scrollHeight + 'px';
        });
      });
      document.getElementById('searchInput').addEventListener('input', handleSearch);
    }

    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const monthGroups = document.querySelectorAll('.month-group');
      const dateGroups = document.querySelectorAll('.date-group');

      if (!query) {
        monthGroups.forEach((mg, mi) => {
          mg.classList.remove('hidden');
          mg.classList.toggle('collapsed', mi > 0);
        });
        dateGroups.forEach((dg, di) => {
          dg.classList.remove('hidden');
          dg.classList.toggle('collapsed', di > 0);
          const files = dg.querySelector('.date-files');
          if (files) files.style.maxHeight = di > 0 ? '0px' : files.scrollHeight + 'px';
        });
        document.querySelectorAll('.file-link').forEach(l => l.style.display = '');
        const info = document.querySelector('.search-results-info');
        if (info) info.remove();
        return;
      }

      let totalMatches = 0;
      dateGroups.forEach(group => {
        const date = group.dataset.date;
        const links = group.querySelectorAll('.file-link');
        let groupHasMatch = false;
        links.forEach(link => {
          const label = link.dataset.label;
          const file = link.dataset.hash;
          const cached = contentCache[file] || '';
          const matches = date.includes(query) || label.includes(query) || cached.toLowerCase().includes(query);
          link.style.display = matches ? '' : 'none';
          if (matches) { groupHasMatch = true; totalMatches++; }
        });
        group.classList.toggle('hidden', !groupHasMatch);
        if (groupHasMatch) {
          group.classList.remove('collapsed');
          const files = group.querySelector('.date-files');
          if (files) files.style.maxHeight = files.scrollHeight + 'px';
        }
      });

      monthGroups.forEach(mg => {
        const hasVisible = [...mg.querySelectorAll('.date-group')].some(dg => !dg.classList.contains('hidden'));
        mg.classList.toggle('hidden', !hasVisible);
        if (hasVisible) mg.classList.remove('collapsed');
      });

      let info = document.querySelector('.search-results-info');
      if (!info) {
        info = document.createElement('div');
        info.className = 'search-results-info';
        document.getElementById('sidebarEntries').prepend(info);
      }
      info.textContent = t().resultsFound(totalMatches);
    }

    async function loadContent(file) {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="loading">${t().loadingContent}</div>`;
      try {
        const res = await fetch(`digests/${file}`);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        contentCache[file] = md;
        const s = t();
        content.innerHTML = `
          <div class="ai-body">${marked.parse(md)}</div>
          <gcds-notice
            class="ai-notice-bottom"
            type="info"
            notice-title-tag="h2"
            notice-title="${s.noticeTopTitle}">
            <gcds-text>${s.disclaimer}</gcds-text>
          </gcds-notice>
        `;
      } catch {
        content.innerHTML = `<div class="loading">${t().failedLoad}</div>`;
      }
      document.querySelectorAll('.file-link').forEach(el => {
        el.classList.toggle('active', el.dataset.hash === file);
      });
    }

    async function preloadContent(manifest) {
      for (const entry of manifest.entries) {
        for (const file of entry.files) {
          if (contentCache[file]) continue;
          try {
            const res = await fetch(`digests/${file}`);
            if (res.ok) contentCache[file] = await res.text();
          } catch {}
        }
      }
    }

    function handleHash() {
      const hash = location.hash.slice(1);
      if (hash) loadContent(hash);
    }

    async function init() {
      applyLang(getLang());
      const manifest = await loadManifest();
      renderSidebar(manifest);
      handleHash();
      if (!location.hash && manifest.entries.length > 0) {
        const latest = manifest.entries[0];
        const sorted = sortFiles(filterFilesByLang(latest.files));
        if (sorted.length > 0) location.hash = sorted[0];
      }
      preloadContent(manifest);
    }

    window.addEventListener('hashchange', handleHash);
    init();
  </script>
</body>
</html>
