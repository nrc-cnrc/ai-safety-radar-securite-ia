<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Safety Radar</title>
  <meta name="description" content="Daily AI safety research, policy, and development digest">
  <link rel="icon" href="https://www.canada.ca/etc/designs/canada/wet-boew/assets/favicon.ico">
  <link rel="alternate" type="application/rss+xml" title="AI Safety Radar RSS" href="feed.xml">

  <!-- GC Design System: utility classes (CSS shortcuts) -->
  <link rel="stylesheet" href="https://cdn.design-system.canada.ca/@cdssnc/gcds-utility@1.11.0/dist/gcds-utility.min.css">

  <!-- GC Design System: component styles + ESM bundle -->
  <link rel="stylesheet" href="https://cdn.design-system.canada.ca/@cdssnc/gcds-components@0.47.0/dist/gcds/gcds.css">
  <script type="module" src="https://cdn.design-system.canada.ca/@cdssnc/gcds-components@0.47.0/dist/gcds/gcds.esm.js"></script>

  <style>
    /* Local layout: sidebar + main, sitting between gcds-header and gcds-footer */
    .layout {
      display: grid;
      grid-template-columns: 265px 1fr;
      gap: 0;
      max-width: 1140px;
      margin: -32px auto 0;
      padding: 0 32px;
      align-items: start;
    }
    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      max-height: 100vh;
      overflow-y: auto;
      padding: 0 12px 12px 0;
      border-right: 1px solid #dcdcdc;
      font-family: 'Noto Sans', sans-serif;
    }
    .main-area { padding: 0 0 48px 32px; min-width: 0; }
    gcds-container[main-container] { --gcds-container-padding: 0; padding: 0 !important; margin: 0 !important; }
    gcds-container[main-container]::part(container) { padding: 0 !important; margin: 0 !important; }
    gcds-header { display: block; margin: 0 !important; }
    gcds-header::part(skip-to-nav) { padding-left: 0; }
    gcds-header::part(container) { max-width: none !important; padding-left: 16px !important; padding-right: 16px !important; }
    /* Force header internal containers to full width when component exposes them */
    gcds-header gcds-container, gcds-header [class*="container"] { max-width: none !important; padding-left: 16px !important; padding-right: 16px !important; }
    body { margin: 0; }

    /* GC Design System search pattern */
    .search-box { margin: 16px 0 12px; padding-top: 16px; border-top: 1px solid #dcdcdc; }
    .sidebar-heading {
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #595959;
      margin: 0 0 8px;
      padding: 12px 4px 0;
      border-top: 1px solid #dcdcdc;
    }
    .search-input-group {
      display: flex;
      align-items: stretch;
      border: 1.9px solid #000;
      background: #fff;
    }
    .search-input-group:focus-within {
      outline: 4px solid #ffbf47;
      outline-offset: 0;
      border-color: #0535d2;
    }
    .search-input-group input[type="search"] {
      flex: 1;
      min-width: 0;
      padding: 6px 8px;
      border: none;
      border-radius: 0;
      font-family: 'Noto Sans', sans-serif;
      font-size: 0.9375rem;
      line-height: 1.5;
      color: #1b1b1b;
      background: transparent;
      box-sizing: border-box;
      -webkit-appearance: none;
      outline: none;
    }
    .search-input-group button {
      flex-shrink: 0;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0 10px;
      cursor: pointer;
      color: #1b1b1b;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .search-input-group button:hover { background: #f1f7fc; }
    .search-input-group button:focus { outline: none; }

    .month-group { border-bottom: 1px solid #dcdcdc; }
    .month-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #595959;
      padding: 10px 4px 6px;
      cursor: pointer;
      user-select: none;
    }
    .month-label:hover { color: #1354ec; }
    .month-label .chevron { transition: transform 0.2s; }
    .month-group.collapsed .chevron { transform: rotate(-90deg); }
    .month-entries { padding: 0 0 4px; }
    .month-group.collapsed .month-entries { display: none; }
    .month-group.hidden { display: none; }

    .date-group { padding: 1px 0; }
    .date-label {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 3px 6px;
      cursor: pointer;
      border-radius: 4px;
      user-select: none;
    }
    .date-label:hover { background: #f2f2f2; }
    .date-label .num { font-family: 'Lato', sans-serif; font-size: 18px; font-weight: 700; color: #333; }
    .date-label .dow { font-size: 13px; color: #595959; font-weight: 500; }
    .date-label .rel { margin-left: auto; padding-right: 4px; font-size: 12px; color: #595959; }
    .date-label .rel.today {
      color: #fff; background: #1f497a;
      padding: 1px 6px; border-radius: 3px; font-weight: 700;
    }
    .date-label .chevron { transition: transform 0.2s; color: #595959; }
    .date-group.collapsed .chevron { transform: rotate(-90deg); }
    .date-files { overflow: hidden; transition: max-height 0.2s ease; }
    .date-group.collapsed .date-files { max-height: 0 !important; }
    .date-group.hidden { display: none; }

    .file-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 3px 10px 3px 18px;
      color: #1f497a;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-size: 15px;
      border-left: 3px solid transparent;
      margin: 0;
    }
    .file-link:hover { background: #f2f2f2; color: #1354ec; }
    .file-link.active {
      background: #e1ecf4;
      border-left: 4px solid #284162;
      padding-left: 17px;
      color: #1b1b1b;
      text-decoration: none;
      font-weight: 700;
    }
    .file-link .badge {
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: #fff;
      border-radius: 3px;
      padding: 2px 6px;
      text-decoration: none;
    }
    .badge-daily { background: #1f497a; }
    .badge-weekly { background: #ee7100; }

    .search-results-info {
      font-size: 13px;
      color: #595959;
      padding: 4px 4px 8px;
      font-weight: 500;
    }

    /* Markdown body inside #content -- match gcds typography */
    #content { max-width: 860px; }
    #content > .welcome p { color: #595959; font-family: 'Noto Sans', sans-serif; font-size: 1rem; line-height: 1.65; }

    /* AI-generated body: monospace on a light surface, framed in a rounded
       box so it reads as a machine-generated artifact. */
    .ai-body {
      background: #f8f8f8;
      color: #333;
      font-family: 'Noto Sans', sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      padding: 1.5rem 1.75rem;
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      margin: 0 0 1.5rem;
    }
    #content .ai-body h1,
    #content .ai-body h2,
    #content .ai-body h3,
    #content .ai-body h4 {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', 'Courier New', monospace;
      font-weight: 700;
      color: #1b1b1b;
    }
    #content .ai-body h1 { font-size: 1.55rem; line-height: 1.25; margin: 0 0 1.1rem; letter-spacing: -0.01em; }
    #content .ai-body > h2:first-of-type { font-size: 1.55rem; line-height: 1.25; margin: 0 0 1.1rem; letter-spacing: -0.01em; padding-bottom: 0; border-bottom: none; }
    #content .ai-body > h2:first-of-type::after { content: ""; display: block; height: 6px; width: 72px; background: #a62a1e; margin-top: 0.5rem; }
    .brand-title::after { display: none !important; }
    #content .ai-body h2 { font-size: 1.15rem; line-height: 1.3; margin: 1.75rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid #dcdcdc; }
    #content .ai-body h3 { font-size: 1rem; line-height: 1.35; margin: 1.25rem 0 0.5rem; }
    #content .ai-body h4 { font-size: 0.9375rem; margin: 1rem 0 0.4rem; }

    .ai-body p,
    .ai-body li {
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.6;
      color: #333;
      font-weight: 400;
    }
    .ai-body p { margin: 0 0 0.85rem; max-width: 80ch; }
    .ai-body ul, .ai-body ol { padding-left: 1.4rem; margin: 0 0 0.85rem; }
    .ai-body li { margin-bottom: 0.35rem; }
    .ai-body a { color: #1f497a; text-decoration: underline; text-underline-offset: 3px; }
    .ai-body a:hover { color: #1354ec; text-decoration-thickness: 2px; }
    .ai-body a:visited { color: #4b248f; }
    .ai-body strong { font-weight: 700; color: #1b1b1b; }
    .ai-body code { font-family: inherit; font-size: 0.92em; background: #ececec; padding: 0.1rem 0.4rem; border-radius: 3px; border: 1px solid #dcdcdc; color: #333; }
    .ai-body pre { font-family: inherit; background: #ececec; padding: 1rem 1.25rem; border-radius: 4px; border-left: 4px solid #1f497a; overflow-x: auto; margin: 0 0 1rem; color: #333; }
    .ai-body pre code { background: none; padding: 0; border: none; color: inherit; }
    .ai-body blockquote { border-left: 4px solid #1f497a; background: #ececec; padding: 0.85rem 1.1rem; margin: 0 0 1rem; border-radius: 0 4px 4px 0; color: #595959; }
    .ai-body hr { border: none; border-top: 1px solid #dcdcdc; margin: 1.75rem 0; }

    .ai-notice-bottom { display: block; margin: 1.5rem 0 0; font-size: 0.75rem; }
    .ai-notice-bottom gcds-text { font-size: 0.75rem; }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    .sidebar-brand { padding: 4px 4px 0; margin-bottom: 0; }
    .brand-title { font-family: 'Lato', sans-serif; font-weight: 700; font-size: 1.75rem; color: #333; margin: 0 0 6px; line-height: 1.2; }
    .brand-desc { font-family: 'Noto Sans', sans-serif; font-size: 0.875rem; font-weight: 400; color: #595959; margin: 0 0 10px; line-height: 1.45; }
    .brand-buttons { display: flex; gap: 6px; flex-wrap: nowrap; }
    .brand-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      font-family: 'Noto Sans', sans-serif;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #1f497a;
      background: #fff;
      border: 1px solid #c5c5c5;
      border-radius: 3px;
      text-decoration: none;
      cursor: pointer;
      line-height: 1.4;
    }
    .brand-btn:hover { background: #f1f7fc; border-color: #1f497a; color: #1f497a; }
    .brand-btn:focus { outline: 4px solid #ffbf47; outline-offset: 0; }
    .brand-btn svg { flex-shrink: 0; }

    .ai-notice-top {
      margin: 0 0 1.25rem;
      padding: 10px 14px 10px 42px;
      position: relative;
      background: #fef0d6;
      border-left: 4px solid #ee7100;
      font-family: 'Noto Sans', sans-serif;
      font-size: 0.875rem;
      line-height: 1.45;
      color: #333;
    }
    .ai-notice-top .icon { position: absolute; left: 14px; top: 12px; width: 18px; height: 18px; color: #ee7100; }
    .ai-notice-top .title { display: block; font-weight: 700; margin-bottom: 2px; color: #1b1b1b; }
    .ai-notice-top .msg { display: block; }
    .ai-notice-top .msg2 { margin-top: 0.6em; }

    .welcome { padding: 1rem 0 3rem; }
    .loading { color: #595959; padding: 1.5rem; text-align: center; font-size: 0.95rem; }

    @media (max-width: 900px) {
      .layout { display: block; padding: 0 16px; }
      .sidebar { position: static; max-height: none; border-right: none; border-bottom: 1px solid #dcdcdc; padding: 0 0 16px; }
      .main-area { padding: 16px 0; }
    }
  </style>
</head>
<body>
  <gcds-header lang-href="#" skip-to-href="#main-content" signature-variant="colour"></gcds-header>

  <gcds-container id="main-content" tag="main" size="full" main-container>
    <div class="layout">
      <aside class="sidebar" id="sidebar" aria-label="Digest archive">
        <div class="sidebar-brand">
          <h1 class="brand-title" id="brandTitle">AI Safety Radar</h1>
          <p class="brand-desc" id="brandDesc">A daily digest of AI safety research and developments</p>
          <div class="brand-buttons">
            <a class="brand-btn" href="https://github.com/ygauthie/ai-safety-radar-securite-ia" target="_blank" rel="noopener">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55 0-.27-.01-1-.02-1.96-3.2.7-3.87-1.54-3.87-1.54-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.68 1.24 3.34.95.1-.74.4-1.24.73-1.53-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.16 1.18a10.96 10.96 0 0 1 5.76 0c2.2-1.49 3.16-1.18 3.16-1.18.62 1.58.23 2.75.11 3.04.74.81 1.18 1.84 1.18 3.1 0 4.43-2.69 5.41-5.26 5.69.41.36.78 1.06.78 2.14 0 1.55-.01 2.8-.01 3.18 0 .31.21.66.79.55C20.21 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
              Source
            </a>
            <a class="brand-btn" href="feed.xml">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1.5"/></svg>
              RSS
            </a>
            <a class="brand-btn" href="https://github.com/ygauthie/ai-safety-radar-securite-ia#mcp-server" target="_blank" rel="noopener" aria-label="MCP server setup instructions" title="MCP server setup instructions">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="6" rx="1"/><rect x="3" y="14" width="18" height="6" rx="1"/><line x1="7" y1="7" x2="7.01" y2="7"/><line x1="7" y1="17" x2="7.01" y2="17"/></svg>
              MCP
            </a>
          </div>
        </div>
        <div id="sidebarBody">
          <div class="loading" id="sidebarLoading">Loading…</div>
        </div>
      </aside>

      <div class="main-area">
        <div id="content">
          <div class="welcome" id="welcomeScreen">
            <p id="welcomeHint">Select a digest from the sidebar to begin reading.</p>
          </div>
        </div>
      </div>
    </div>
  </gcds-container>

  <gcds-footer
    display="compact"
    contextual-heading="AI Safety Radar"
    contextual-links='{"Source code":"https://github.com/ygauthie/ai-safety-radar-securite-ia","RSS feed":"feed.xml"}'>
  </gcds-footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const I18N = {
      en: {
        noticeTopTitle: 'AI-generated content',
        disclaimer: 'Digests are generated by an AI model summarizing feeds from public sources and may contain errors or omissions; always check the sources before citing.',
        disclaimer2: 'This content is for research purposes and does not reflect the views of the National Research Council or the Government of Canada.',
        noDigests: 'No digests available yet.<br>Run the pipeline to generate the first digest.',
        loadingContent: 'Loading...',
        failedLoad: 'Failed to load digest.',
        searchPlaceholder: 'Search digests...',
        searchLabel: 'Search',
        archiveLabel: 'Archive',
        resultsFound: (n) => `${n} result${n !== 1 ? 's' : ''} found`,
        welcomeTitle: 'AI Safety Radar',
        welcomeSub: 'A daily digest of AI safety research and developments',
        welcomeHint: 'Select a digest from the sidebar to begin reading.',
        fileLabels: {
          'safety-daily': 'Daily Digest',
          'safety-weekly': 'Past Week',
          'safety-research': 'Research Papers',
          'safety-analysis': 'Blogs & News',
          'safety-community': 'Community & Tools',
          'safety-arxiv': 'ArXiv Papers',
          'safety-github': 'GitHub Activity',
          'safety-rss': 'Blog Posts',
          'safety-aisi': 'AI Safety Institutes',
          'safety-hn': 'Hacker News',
          'safety-journals': 'Journal Articles',
        },
        badges: { daily: 'Daily', weekly: 'Weekly' },
        locale: 'en-US',
      },
      fr: {
        noticeTopTitle: 'Contenu généré par IA',
        disclaimer: 'Les synthèses sont générées par un modèle d\'IA qui résume des flux de sources publiques et peuvent contenir des erreurs ou des omissions ; vérifiez toujours les sources avant toute citation.',
        disclaimer2: 'Ce contenu est à des fins de recherche et ne reflète pas les positions du Conseil national de recherches du Canada ni du gouvernement du Canada.',
        noDigests: 'Aucun bulletin disponible pour l\'instant.<br>Lancez le pipeline pour générer le premier bulletin.',
        loadingContent: 'Chargement...',
        failedLoad: 'Impossible de charger le bulletin.',
        searchPlaceholder: 'Rechercher...',
        searchLabel: 'Rechercher',
        archiveLabel: 'Archives',
        resultsFound: (n) => `${n} résultat${n !== 1 ? 's' : ''} trouvé${n !== 1 ? 's' : ''}`,
        welcomeTitle: 'Radar de la sécurité en IA',
        welcomeSub: 'Une synthèse quotidienne des avancées en recherche sur la sécurité de l\'IA',
        welcomeHint: 'Sélectionnez un bulletin dans la barre latérale pour commencer à lire.',
        fileLabels: {
          'safety-daily': 'Bulletin quotidien',
          'safety-weekly': 'Résumé hebdomadaire',
          'safety-research': 'Articles de recherche',
          'safety-analysis': 'Blogues et actualités',
          'safety-community': 'Communauté et outils',
          'safety-arxiv': 'Articles ArXiv',
          'safety-github': 'Activité GitHub',
          'safety-rss': 'Articles de blogue',
          'safety-aisi': 'Instituts de sécurité de l\'IA',
          'safety-hn': 'Hacker News',
          'safety-journals': 'Articles scientifiques',
        },
        badges: { daily: 'Quotidien', weekly: 'Hebdo' },
        locale: 'fr-CA',
      },
    };

    function getLang() { return localStorage.getItem('lang') || 'en'; }
    function t() { return I18N[getLang()]; }

    function applyLang(lang) {
      const strings = I18N[lang];
      document.documentElement.lang = lang;
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      set('brandTitle', strings.welcomeTitle);
      set('brandDesc', strings.welcomeSub);
      set('welcomeSub', strings.welcomeSub);
      set('welcomeHint', strings.welcomeHint);
    }

    function hashForLang(hash, lang) {
      if (!hash) return hash;
      if (lang === 'fr') return hash.endsWith('.fr.md') ? hash : hash.replace('.md', '.fr.md');
      return hash.replace('.fr.md', '.md');
    }

    // Point the gcds-header lang toggle at ?lang=<other>#<file-for-other-lang>.
    // The toggle is a real anchor in the shadow DOM, so a normal navigation is
    // simplest — we read ?lang on load, persist it, and clean the URL.
    function updateLangToggleHref() {
      const header = document.querySelector('gcds-header');
      if (!header) return;
      const cur = getLang();
      const next = cur === 'en' ? 'fr' : 'en';
      const nextHash = hashForLang(location.hash, next);
      header.setAttribute('lang-href', `?lang=${next}${nextHash || ''}`);
    }

    function readLangFromUrl() {
      const params = new URLSearchParams(location.search);
      const urlLang = params.get('lang');
      if (urlLang !== 'en' && urlLang !== 'fr') return false;
      const changed = getLang() !== urlLang;
      localStorage.setItem('lang', urlLang);
      // Strip ?lang from the URL but keep the file hash.
      history.replaceState(null, '', location.pathname + location.hash);
      return changed;
    }

    const contentCache = {};

    function sortFiles(files) {
      const priority = { 'weekly': 0, 'daily': 1, 'research': 2 };
      return [...files].sort((a, b) => {
        const pa = Object.entries(priority).find(([k]) => a.includes(k));
        const pb = Object.entries(priority).find(([k]) => b.includes(k));
        const va = pa ? pa[1] : 99;
        const vb = pb ? pb[1] : 99;
        if (va !== vb) return va - vb;
        return a.localeCompare(b);
      });
    }

    function filterFilesByLang(files) {
      const lang = getLang();
      if (lang === 'fr') {
        return files
          .filter(f => !f.endsWith('.fr.md'))
          .map(f => files.includes(f.replace('.md', '.fr.md')) ? f.replace('.md', '.fr.md') : f);
      }
      return files.filter(f => !f.endsWith('.fr.md'));
    }

    function fileLabel(filename) {
      const map = t().fileLabels;
      for (const [key, label] of Object.entries(map)) {
        if (filename.includes(key)) return label;
      }
      return filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/\.fr\.md$/, '').replace('.md', '');
    }

    function fileBadge() {
      return '';
    }

    async function loadManifest() {
      try {
        const res = await fetch('manifest.json');
        if (!res.ok) throw new Error('No manifest');
        return await res.json();
      } catch {
        return { entries: [] };
      }
    }

    let currentManifest = null;

    function monthKey(date) { return date.slice(0, 7); }
    function monthLabel(ym) {
      const [y, m] = ym.split('-');
      return new Date(+y, +m - 1, 1).toLocaleDateString(t().locale, { month: 'long', year: 'numeric' });
    }

    function renderSidebar(manifest) {
      currentManifest = manifest;
      const sidebar = document.getElementById('sidebarBody');
      if (manifest.entries.length === 0) {
        sidebar.innerHTML = `<div class="loading">${t().noDigests}</div>`;
        return;
      }

      const months = [];
      const monthMap = {};
      for (const entry of manifest.entries) {
        const mk = monthKey(entry.date);
        if (!monthMap[mk]) { monthMap[mk] = []; months.push(mk); }
        monthMap[mk].push(entry);
      }

      const chevronSvg = `<svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>`;

      let html = `
        <form role="search" class="search-box" onsubmit="return false">
        <label class="sr-only" for="searchInput">${t().searchLabel}</label>
        <div class="search-input-group">
          <input type="search" id="searchInput" placeholder="${t().searchPlaceholder}" aria-label="${t().searchLabel}" autocomplete="off">
          <button type="submit" aria-label="${t().searchLabel}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
      </form>`;
      html += '<div id="sidebarEntries">';

      months.forEach((mk, mi) => {
        const monthCollapsed = mi > 0 ? ' collapsed' : '';
        html += `<div class="month-group${monthCollapsed}" data-month="${mk}">`;
        html += `<div class="month-label" role="button" tabindex="0"><span>${monthLabel(mk)}</span>${chevronSvg}</div>`;

        const entriesHtml = monthMap[mk].map((entry, i) => {
          const sorted = sortFiles(filterFilesByLang(entry.files));
          const dayCollapsed = (mi === 0 && i === 0) ? '' : ' collapsed';
          const filesHtml = sorted.map(file =>
            `<a href="#${file}" class="file-link" data-hash="${file}" data-label="${fileLabel(file).toLowerCase()}" data-date="${entry.date}"><span class="lbl">${fileLabel(file)}</span>${fileBadge(file)}</a>`
          ).join('');
          const filesHeight = sorted.length * 30;
          const d = new Date(entry.date + 'T12:00:00');
          const lang = getLang();
          const dayNum = d.getDate();
          const dow = d.toLocaleDateString(lang === 'fr' ? 'fr-CA' : 'en-US', { weekday: 'short' }).replace('.', '');
          const today = new Date(); today.setHours(0,0,0,0);
          const dCopy = new Date(d); dCopy.setHours(0,0,0,0);
          const diffDays = Math.round((today - dCopy) / 86400000);
          let relText = '', relClass = '';
          if (diffDays === 0) { relText = lang === 'fr' ? "Aujourd'hui" : "Today"; relClass = 'today'; }
          else if (diffDays === 1) { relText = lang === 'fr' ? 'hier' : 'yesterday'; }
          else if (diffDays > 1 && diffDays < 60) {
            relText = lang === 'fr' ? `il y a ${diffDays} jours` : `${diffDays} days ago`;
          }
          return `<div class="date-group${dayCollapsed}" data-date="${entry.date}">
            <div class="date-label" role="button" tabindex="0">
              <span class="num">${dayNum}</span>
              <span class="dow">${dow}</span>
              ${relText ? `<span class="rel ${relClass}">${relText}</span>` : ''}
              ${chevronSvg}
            </div>
            <div class="date-files" style="max-height:${dayCollapsed ? 0 : filesHeight}px">${filesHtml}</div>
          </div>`;
        }).join('');

        html += `<div class="month-entries">${entriesHtml}</div>`;
        html += '</div>';
      });

      html += '</div>';
      sidebar.innerHTML = html;

      document.querySelectorAll('.month-label').forEach(label => {
        label.addEventListener('click', () => label.closest('.month-group').classList.toggle('collapsed'));
      });
      document.querySelectorAll('.date-label').forEach(label => {
        label.addEventListener('click', () => {
          const group = label.closest('.date-group');
          const files = group.querySelector('.date-files');
          const isCollapsed = group.classList.toggle('collapsed');
          files.style.maxHeight = isCollapsed ? '0px' : files.scrollHeight + 'px';
        });
      });
      document.getElementById('searchInput').addEventListener('input', handleSearch);
    }

    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const monthGroups = document.querySelectorAll('.month-group');
      const dateGroups = document.querySelectorAll('.date-group');

      if (!query) {
        monthGroups.forEach((mg, mi) => {
          mg.classList.remove('hidden');
          mg.classList.toggle('collapsed', mi > 0);
        });
        dateGroups.forEach((dg, di) => {
          dg.classList.remove('hidden');
          dg.classList.toggle('collapsed', di > 0);
          const files = dg.querySelector('.date-files');
          if (files) files.style.maxHeight = di > 0 ? '0px' : files.scrollHeight + 'px';
        });
        document.querySelectorAll('.file-link').forEach(l => l.style.display = '');
        const info = document.querySelector('.search-results-info');
        if (info) info.remove();
        return;
      }

      let totalMatches = 0;
      dateGroups.forEach(group => {
        const date = group.dataset.date;
        const links = group.querySelectorAll('.file-link');
        let groupHasMatch = false;
        links.forEach(link => {
          const label = link.dataset.label;
          const file = link.dataset.hash;
          const cached = contentCache[file] || '';
          const matches = date.includes(query) || label.includes(query) || cached.toLowerCase().includes(query);
          link.style.display = matches ? '' : 'none';
          if (matches) { groupHasMatch = true; totalMatches++; }
        });
        group.classList.toggle('hidden', !groupHasMatch);
        if (groupHasMatch) {
          group.classList.remove('collapsed');
          const files = group.querySelector('.date-files');
          if (files) files.style.maxHeight = files.scrollHeight + 'px';
        }
      });

      monthGroups.forEach(mg => {
        const hasVisible = [...mg.querySelectorAll('.date-group')].some(dg => !dg.classList.contains('hidden'));
        mg.classList.toggle('hidden', !hasVisible);
        if (hasVisible) mg.classList.remove('collapsed');
      });

      let info = document.querySelector('.search-results-info');
      if (!info) {
        info = document.createElement('div');
        info.className = 'search-results-info';
        document.getElementById('sidebarEntries').prepend(info);
      }
      info.textContent = t().resultsFound(totalMatches);
    }

    async function loadContent(file) {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="loading">${t().loadingContent}</div>`;
      try {
        const res = await fetch(`digests/${file}`);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        contentCache[file] = md;
        const s = t();
        content.innerHTML = `
          <div class="ai-body"><div class="ai-notice-top" role="note"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="title">${s.noticeTopTitle}</span><span class="msg">${s.disclaimer}</span><span class="msg msg2">${s.disclaimer2}</span></div>${marked.parse(md).replace(/^\s*<h1>([\s\S]*?)<\/h1>/, '<h2>$1</h2>')}</div>
        `;
      } catch {
        content.innerHTML = `<div class="loading">${t().failedLoad}</div>`;
      }
      document.querySelectorAll('.file-link').forEach(el => {
        el.classList.toggle('active', el.dataset.hash === file);
      });
    }

    async function preloadContent(manifest) {
      for (const entry of manifest.entries) {
        for (const file of entry.files) {
          if (contentCache[file]) continue;
          try {
            const res = await fetch(`digests/${file}`);
            if (res.ok) contentCache[file] = await res.text();
          } catch {}
        }
      }
    }

    function handleHash() {
      const hash = location.hash.slice(1);
      if (hash) loadContent(hash);
      updateLangToggleHref();
    }

    async function init() {
      readLangFromUrl();
      applyLang(getLang());
      const manifest = await loadManifest();
      renderSidebar(manifest);
      handleHash();
      if (!location.hash && manifest.entries.length > 0) {
        const latest = manifest.entries[0];
        const sorted = sortFiles(filterFilesByLang(latest.files));
        if (sorted.length > 0) location.hash = sorted[0];
      }
      updateLangToggleHref();
      preloadContent(manifest);
    }

    window.addEventListener('hashchange', handleHash);
    init();
  </script>
</body>
</html>
